gmail_pipeline:
  extraction:
    query: "is:unread"
    batch_size: 10
    fields: 
      - "subject"
      - "from"
      - "date"
    extraction_mode: "full"

  transformation:
    index_name: "gmail_index"
    textractor:
      paragraphs: true
      sections: true
    segmentation:
      sentences: true
      minlength: 20
      maxlength: 512

  embeddings:
    # This was missing!
    engine: "txtai"
    model_path: "sentence-transformers/all-MiniLM-L6-v2"
    
  load:
    index_name: "gmail_index"