# Extraction Configuration
postgres:
  extraction:
    # Global settings for this source
    source_name: "health_db"
    
    tables:
      - table_name: "users"
        schema: "public"
        columns: ["id", "username", "email", "created_at", "updated_at"]
        extraction_mode: "incremental"
        incremental_column: "updated_at"
        batch_size: 1000

      - table_name: "orders"
        schema: "public"
        columns: ["order_id", "user_id", "order_date", "total_amount", "status"]
        extraction_mode: "incremental"
        incremental_column: "order_date"
        batch_size: 1000

      - table_name: "products"
        schema: "public"
        columns: null  # Selects all (*)
        extraction_mode: "full"
        batch_size: 5000