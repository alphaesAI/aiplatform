services:
  # PostgreSQL Database - NEW!
  postgres:
    image: postgres:15-alpine
    container_name: health-pipeline-postgres
    environment:
      POSTGRES_DB: health_pipeline
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass_2026
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - health-pipeline-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user -d health_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Server - NEW!
  api:
    build: ./api_server
    container_name: health-pipeline-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://health_user:health_pass_2026@postgres:5432/health_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - health-pipeline-network
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: health-pipeline-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=health-pipeline-cluster
      - node.name=health-pipeline-node
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - health-pipeline-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: health-pipeline-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - health-pipeline-network

  redis:
    image: redis:7-alpine
    container_name: health-pipeline-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - health-pipeline-network
    command: redis-server --appendonly yes

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local

networks:
  health-pipeline-network:
    driver: bridge
